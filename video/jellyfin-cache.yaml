apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: jellyfin-server-cache
  namespace: video
  labels:
    app.kubernetes.io/component: volume
    app.kubernetes.io/app: video
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: longhorn
  resources:
    requests:
      storage: 50Gi
