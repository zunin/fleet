apiVersion: batch/v1
kind: CronJob
metadata:
  name: hister-crawler
  namespace: search
  labels:
    app.kubernetes.io/name: hister-crawler
    app.kubernetes.io/component: crawler
spec:
  schedule: "0 */1 * * *" # Every hour — adjust to taste
  concurrencyPolicy: Forbid # Never overlap crawl runs
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 1
      activeDeadlineSeconds: 3600 # Kill the job after 1 hour max
      template:
        metadata:
          labels:
            app.kubernetes.io/name: hister-crawler
            app.kubernetes.io/component: crawler
        spec:
          restartPolicy: Never
          containers:
            - name: crawler
              image: ghcr.io/asciimoo/hister:v0.15.0
              workingDir: /hister
              env:
                - name: ACCESS_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: hister-config # Reuses your existing SealedSecret
                      key: ACCESS_TOKEN
              command:
                - /bin/sh
                - -c
                - |
                  set -e

                  SERVER="https://hister.nikolaiathome.com"
                  TOKEN="${ACCESS_TOKEN}"

                  # ── Add your news / rapidly-changing sites below ──

                  echo "==> Crawling dr.dk..."
                  /hister/hister index \
                    --server-url "$SERVER" \
                    --token "$TOKEN" \
                    https://dr.dk/

                  echo "==> Crawling dr.dk/nyheder..."
                  /hister/hister index --recursive \
                    --server-url "$SERVER" \
                    --token "$TOKEN" \
                    --max-depth 1 \
                    --max-links 50 \
                    --allowed-pattern "dr.dk/nyheder" \
                    https://dr.dk/nyheder

                  # Add more sites as needed:
                  # echo "==> Crawling Example News..."
                  # /hister/hister index --recursive \
                  #   --server-url "$SERVER" \
                  #   --token "$TOKEN" \
                  #   --max-depth 1 \
                  #   --max-links 50 \
                  #   --allowed-pattern "example.com/news" \
                  #   https://example.com/news/

                  echo "==> All crawl jobs finished."
              resources:
                limits:
                  memory: 256Mi
                  cpu: 500m
                requests:
                  memory: 128Mi
                  cpu: 100m
