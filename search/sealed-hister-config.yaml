---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hister-config
  namespace: search
spec:
  encryptedData:
    ACCESS_TOKEN: 
  template:
    metadata:
      name: hister-config
      namespace: search
    data:
      config.yml: |
        app:
          access_token: '{{ index . "ACCESS_TOKEN" }}'
          directory: '~/.config/hister'
          search_url: 'https://duckduckgo.com/?t=ffab&q={query}'
          log_level: 'info'
          open_results_on_new_tab: false
        
        indexer:
          detect_languages: true
          directories:
            - path: '~/notes'
              filetypes: ['txt', 'md']

        crawler:
          backend: 'http'
          timeout: 5
          delay: 1
          user_agent: 'Hister'

        server:
          address: '0.0.0.0:4433'
          base_url: 'https://hister.nikolaiathome.com'
          database: 'db.sqlite3'
          oauth:
            oidc:
              client_id: '216202172960931856@nikolaiathome'
              client_secret: '{{ index . "OIDC_CLIENT_SECRET" }}'
              configuration_url: 'https://auth.nikolaiathome.com/.well-known/openid-configuration'
        
        semantic_search:
          enable: false

        hotkeys:
          web:
            '/': 'focus_search_input'
            'enter': 'open_result'
            'alt+enter': 'open_result_in_new_tab'
            'alt+j': 'select_next_result'
            'alt+k': 'select_previous_result'
            'alt+o': 'open_query_in_search_engine'
            'alt+v': 'view_result_popup'
            'tab': 'autocomplete'
            '?': 'show_hotkeys'
        
        sensitive_content_patterns:
          aws_access_key: '(^|[s"''])AKIA[0-9A-Z]{16}([s"'']|$)'
          github_token: '(ghp|gho|ghu|ghs|ghr)_[a-zA-Z0-9]{36}'