apiVersion: kro.run/v1alpha1
kind: Application
metadata:
  name: gatus
  namespace: health
spec:
  name: gatus
  namespace: health
  container:
    image: ghcr.io/twin/gatus
    # renovate: datasource=github-releases depName=navidrome/navidrome
    tag: v5.35.0 
    port: 8080
  url: "gatus.nikolaiathome.com"
  replicas: 1
  ingress:
    enabled: true
  externalVolumes:
    config:
      name: data
      persistentVolumeClaim: gatus-data
      containerMountPath: /data
  env:
    TZ: "Europe/Copenhagen"
    PUID: "5000"
    PGID: "5000"
  resources:
    memory: "100Mi"
    cpu: "0.1"
  filebrowser:
    enabled: false
  runAsUser: 5000
  runAsNonRoot: true
  livenessProbePath: '/health' 
