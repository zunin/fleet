apiVersion: kro.run/v1alpha1
kind: ResourceGraphDefinition
metadata:
  name: app-template
  annotations:
    kro.run/allow-breaking-changes: "true"
spec:
  schema:
    apiVersion: v1alpha1
    kind: Application
    types:
      Container:
        image: string
        tag: string
        port: integer | default=80
      Volume:
        name: string
        persistentVolumeClaim: string
        containerMountPath: string
        readOnly: boolean | default=false
      SecretBinding:
        secretName: string
        valuesKey: string
      FileBrowserConfig:
        enabled: boolean | default=true
        port: integer
      ResourceLimit:
        memory: string | default=300Mi pattern="^([+-]?[0-9.]+)([eEinumkKMGTP]*[-+]?[0-9]*)$"
        cpu: string | default=1 pattern="^([+-]?[0-9.]+)([eEinumkKMGTP]*[-+]?[0-9]*)$"

    spec:
      name: string
      namespace: string
      container: Container
      url: string
      replicas: integer | default=1
      ingress:
        enabled: boolean | default=true
      externalVolumes:
        config: Volume
        data: Volume
        cache: Volume
      env: "map[string]string | default={}"
      envFromSecrets: "map[string]SecretBinding | default={}"
      filebrowser: FileBrowserConfig
      runAsUser: integer | default=1000
      runAsNonRoot: boolean | default=true
      resources: ResourceLimit
      livenessProbePath: string
      node: string | default="unset"
      readOnlyRootFilesystem: boolean | default=true
    status:
      # Fields the controller will inject into instances status.
      deploymentConditions: ${deployment.status.conditions}
      availableReplicas: ${deployment.status.availableReplicas}

  # Define the resources this API will manage.
  resources:
    - id: dataVolumeClaim
      includeWhen:
        - ${schema.spec.externalVolumes.?data.?persistentVolumeClaim.orValue("") != ""}
      externalRef:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: ${schema.spec.externalVolumes.?data.?persistentVolumeClaim}
          namespace: ${schema.spec.namespace}
      readyWhen:
        - ${dataVolumeClaim.status.phase == "Bound"}
    - id: dataVolume
      includeWhen: 
        - ${schema.spec.externalVolumes.?data.?persistentVolumeClaim.orValue("") != ""}
      externalRef:
        apiVersion: v1
        kind: PersistentVolume
        metadata:
          name: ${dataVolumeClaim.spec.volumeName}
      readyWhen:
        - ${dataVolume.status.phase == "Bound"}
    - id: configVolumeClaim
      includeWhen:
        - ${schema.spec.externalVolumes.?config.?persistentVolumeClaim.orValue("") != ""}
      externalRef:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: ${schema.spec.externalVolumes.?config.?persistentVolumeClaim}
          namespace: ${schema.spec.namespace}
      readyWhen:
        - ${configVolumeClaim.status.phase == "Bound"}
    - id: cacheVolumeClaim
      includeWhen:
        - ${schema.spec.externalVolumes.?cache.?persistentVolumeClaim.orValue("") != ""}
      externalRef:
        apiVersion: v1
        kind: PersistentVolumeClaim
        metadata:
          name: ${schema.spec.externalVolumes.?cache.?persistentVolumeClaim}
          namespace: ${schema.spec.namespace}
      readyWhen:
        - ${cacheVolumeClaim.status.phase == "Bound"}
    - id: deployment
      template:
        apiVersion: apps/v1
        kind: Deployment
        metadata:
          name: ${schema.spec.name} # Use the name provided by user
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.spec.name}-deployment
            app.kubernetes.io/component: deployment
        spec:
          replicas: ${schema.spec.replicas} # Use the replicas provided by user
          strategy:
          #  type: Recreate
            type: RollingUpdate
            #rollingUpdate:
            #  maxSurge: 0
            #  maxUnavailable: 1
          selector:
            matchLabels:
              app.kubernetes.io/name: ${schema.spec.name}
              app.kubernetes.io/instance: ${schema.spec.name}-pod
              app.kubernetes.io/component: app
          template:
            metadata:
              namespace: ${schema.spec.namespace}
              labels:
                app.kubernetes.io/name: ${schema.spec.name}
                app.kubernetes.io/instance: ${schema.spec.name}-pod
                app.kubernetes.io/component: app
            spec:
              automountServiceAccountToken: false
              affinity: "${schema.spec.node == 'unset' ? {} : {
                  'nodeAffinity': {
                    'requiredDuringSchedulingIgnoredDuringExecution': {
                      'nodeSelectorTerms': [
                        {'matchExpressions': [{
                          'key': 'kubernetes.io/hostname',
                          'operator': 'In',
                          'values': [schema.spec.node]
                        }]}
                      ]
                    }
                  }
                }}"
              terminationGracePeriodSeconds: 60      
              securityContext:
                seccompProfile:
                  type: RuntimeDefault                    # enable seccomp and the runtimes default profile
                runAsUser: ${schema.spec.runAsUser}       # hardcode user to non-root if not set in Dockerfile
                runAsGroup: ${schema.spec.runAsUser}      # hardcode group to non-root if not set in Dockerfile
                runAsNonRoot: ${schema.spec.runAsNonRoot} # hardcode to non-root. Redundant to above if Dockerfile is set USER 1000
                fsGroup: ${schema.spec.runAsUser}
                fsGroupChangePolicy: OnRootMismatch
              volumes: "${
                [] 
                + (schema.spec.externalVolumes.config.?name.orValue('') != '' ? [{
                  'name': schema.spec.externalVolumes.config.?name.orValue(''),
                  'persistentVolumeClaim':
                    {
                      'claimName': schema.spec.externalVolumes.config.?persistentVolumeClaim.orValue('')
                    }
                }] : [])
                + (schema.spec.externalVolumes.data.?name.orValue('') != '' ? [{
                  'name': schema.spec.externalVolumes.data.?name.orValue(''),
                  'persistentVolumeClaim':
                    {
                      'claimName': schema.spec.externalVolumes.data.?persistentVolumeClaim.orValue('')
                    }
                }] : [])
                + (schema.spec.externalVolumes.cache.?name.orValue('') != '' ? [{
                  'name': schema.spec.externalVolumes.cache.?name.orValue(''),
                  'persistentVolumeClaim':
                    {
                      'claimName': schema.spec.externalVolumes.cache.?persistentVolumeClaim.orValue('')
                    }
                }] : [])
                + (schema.spec.filebrowser.?enabled.orValue(false) ? [{
                  'name': schema.spec.name+'-filebrowser-config',
                  'configMap': {
                    'name': schema.spec.name+'-filebrowser-config',
                    'defaultMode': 420
                  }
                }] : [])
                }"
              hostNetwork: ${schema.spec.filebrowser.?enabled.orValue(false)}
              dnsPolicy: "${schema.spec.filebrowser.?enabled.orValue(false) ? 'ClusterFirstWithHostNet' : 'Default'}"
              containers: "${
                [] +
                [{
                  'name': schema.spec.name,
                  'image': schema.spec.container.image + ':' + schema.spec.container.tag,
                  'volumeMounts': [
                      schema.spec.externalVolumes.config, 
                      schema.spec.externalVolumes.data,
                      schema.spec.externalVolumes.cache
                    ].filter(y, y.?name.orValue('') != '' && y.?containerMountPath.orValue('') != '' && y.?readOnly.orValue('') != '').map(x,
                      {
                        'name': x.name,
                        'mountPath': x.containerMountPath,
                        'readOnly': x.readOnly
                      }
                    ),
                  'env': [] + schema.spec.env.map(k, k).sort().map(envKey, 
                        {'name': envKey, 'value': schema.spec.env[envKey]}
                      ) + schema.spec.envFromSecrets.map(s, s).sort().map(secretEnvKey, 
                        {
                          'name': secretEnvKey, 
                          'valueFrom': {
                            'secretKeyRef': 
                            {
                              'name': schema.spec.envFromSecrets[secretEnvKey].secretName, 
                              'key': schema.spec.envFromSecrets[secretEnvKey].valuesKey
                            }
                          }
                        }
                      )
                    ,
                  'ports': [
                      {
                        'containerPort': schema.spec.container.port
                      }
                    ],
                  'securityContext': {
                    'readOnlyRootFilesystem': schema.spec.readOnlyRootFilesystem,
                    'allowPrivilegeEscalation': false,
                    'privileged': false, 
                    'runAsUser':schema.spec.runAsUser,
                    'runAsGroup': schema.spec.runAsUser
                  },
                  'resources': {
                    'limits': {
                      'memory': schema.spec.resources.memory
                    },
                    'requests': {
                      'memory': schema.spec.resources.memory,
                      'cpu': schema.spec.resources.cpu
                    }
                  },
                  'livenessProbe': {      
                   'httpGet': {
                     'path': schema.spec.livenessProbePath,
                     'port': schema.spec.container.port
                   },
                  },
                  'startupProbe': {        
                   'httpGet': {       
                     'path': schema.spec.livenessProbePath,
                     'port': schema.spec.container.port
                   },
                   'failureThreshold': 30,
                   'periodSeconds': 10
                  }
                  }] +
                  (schema.spec.filebrowser.?enabled.orValue(false) == false ? [] : (
                  [{
                    'name': 'filebrowser',
                    'image': 'docker.io/copyparty/ac:1.20.12',
                    'ports': [{'containerPort': schema.spec.filebrowser.?port.orValue(0)}],
                    'resources': {
                      'limits': {
                        'memory': '200Mi'
                      },
                      'requests': {
                        'memory': '100Mi',
                        'cpu': '0.5'
                      }
                    },
                    'readinessProbe': {
                      'httpGet': { 
                        'path': '/?setck=a=x',
                        'port': schema.spec.filebrowser.?port.orValue(0)
                      }
                    },
                    'volumeMounts': [] + [
                      {
                        'mountPath': '/cfg', 
                        'name': schema.spec.name+'-filebrowser-config',
                        'readOnly': true
                      }
                    ] + [
                      schema.spec.externalVolumes.config, 
                      schema.spec.externalVolumes.data,
                      schema.spec.externalVolumes.cache
                    ].filter(y, y.?name.orValue('') != '' && y.?containerMountPath.orValue('') != '' && y.?readOnly.orValue('') != '').map(x,
                      {
                        'name': x.name,
                        'mountPath': '/w' + x.containerMountPath,
                        'readOnly': x.readOnly
                      }
                    )
                  }]
                  ))
                }"                       
    - id: filebrowserservice
      includeWhen:
        - ${schema.spec.filebrowser.?enabled.orValue(false)}
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-filebrowser-svc
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.spec.name}-filebrowser-service
            app.kubernetes.io/component: service
        spec:
          selector: ${deployment.spec.selector.matchLabels} # Use the deployment selector
          ports:
            - name: http
              protocol: TCP
              port: 80
              targetPort: ${schema.spec.filebrowser.?port.orValue(0)}
    - id: service
      template:
        apiVersion: v1
        kind: Service
        metadata:
          name: ${schema.spec.name}-svc
          namespace: ${schema.spec.namespace}
          labels:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.spec.name}-service
            app.kubernetes.io/component: service
        spec:
          selector: ${deployment.spec.selector.matchLabels} # Use the deployment selector
          ports:
            - name: http
              protocol: TCP
              port: 80
              targetPort: ${schema.spec.container.port}

    - id: ingress
      includeWhen:
        - ${schema.spec.ingress.enabled} # Only include if the user wants to create an Ingress
      template:
        apiVersion: networking.k8s.io/v1
        kind: Ingress
        metadata:
          name: ${schema.spec.name}-ingress
          namespace: ${schema.spec.namespace}
          annotations:
            app.kubernetes.io/name: ${schema.spec.name}
            app.kubernetes.io/instance: ${schema.spec.name}-ingress
            app.kubernetes.io/component: ingress
            gatus.home-operations.com/endpoint: |
              name: ${schema.spec.name}
              conditions:
                - "[STATUS] == 200"
                - "[RESPONSE_TIME] < 500"
              client:
                timeout: 5s
        spec:
          tls:
          - hosts:
            - ${schema.spec.url}
            secretName: ${service.metadata.name}-http-tls
          rules:
            - host: ${schema.spec.url}
              http:
                paths:
                  - path: "/"
                    pathType: Prefix
                    backend:
                      service:
                        name: ${service.metadata.name} # Use the service name
                        port:
                          number: 80
    - id: copypartyconfig
      includeWhen:
        - ${schema.spec.filebrowser.?enabled.orValue(false)}
      template:
        apiVersion: v1
        kind: ConfigMap
        metadata:
          name: ${schema.spec.name}-filebrowser-config
          namespace: ${schema.spec.namespace}
        data:
          copyparty.conf: |
            [global]
              name: ${schema.spec.name}
              p: ${string(schema.spec.filebrowser.?port.orValue(0))}
              z
              ansi   # enable colors in log messages
            [/]            # create a volume at "/" (the webroot), which will
              /w           # share /w (the docker data volume)
                accs:
                  rwmd: *      # everyone gets read-write-move-delete access
